x-spark-common: &spark-common
  build: ./spark
  volumes:
    - ./jobs:/jobs        # job scripts available at /jobs inside every container
    - ../:/project_data   # project root CSVs available at /project_data
  networks:
    - lakehouse
  environment:
    PYSPARK_PYTHON: python3
    PYSPARK_DRIVER_PYTHON: python3
    AWS_REGION: us-east-1

services:

  # ── Object Storage ────────────────────────────────────────────────────────
  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"     # S3-compatible API
      - "9001:9001"     # Web console → http://localhost:9001  (minioadmin / minioadmin)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lakehouse

  # Creates the warehouse bucket on first start then exits
  minio-init:
    image: minio/mc
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb local/warehouse --ignore-existing;
        echo 'Bucket warehouse ready';
      "
    networks:
      - lakehouse

  # ── Iceberg REST Catalog ──────────────────────────────────────────────────
  iceberg-rest:
    image: tabulario/iceberg-rest
    container_name: iceberg-rest
    ports:
      - "8181:8181"
    environment:
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      CATALOG_S3_ACCESS__KEY__ID: minioadmin
      CATALOG_S3_SECRET__ACCESS__KEY: minioadmin
      CATALOG_S3_REGION: us-east-1
      AWS_REGION: us-east-1
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - lakehouse

  # ── Spark Cluster (standalone mode) ──────────────────────────────────────
  spark-master:
    <<: *spark-common
    container_name: spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    ports:
      - "8080:8080"     # Spark master web UI → http://localhost:8080
      - "7077:7077"     # Spark RPC port

  spark-worker-1:
    <<: *spark-common
    container_name: spark-worker-1
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --webui-port
      - "8081"
      - --memory
      - 2g
      - --cores
      - "2"
    ports:
      - "8081:8081"     # Worker web UI → http://localhost:8081
    depends_on:
      - spark-master

  spark-worker-2:
    <<: *spark-common
    container_name: spark-worker-2
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --webui-port
      - "8081"
      - --memory
      - 2g
      - --cores
      - "2"
    ports:
      - "8082:8081"     # Worker web UI → http://localhost:8082
    depends_on:
      - spark-master

# ── Shared network ────────────────────────────────────────────────────────────
# The streaming and orchestration stacks will attach to this same network
networks:
  lakehouse:
    driver: bridge
    name: lakehouse

volumes:
  minio_data:
